name: FocusTimer
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO

targets:
  FocusTimer:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: FocusTimer
        excludes:
          - "**/.DS_Store"
    resources:
      - path: FocusTimer/Resources/Assets.xcassets
    info:
      path: FocusTimer/Resources/Info.plist
      properties:
        CFBundleName: FocusTimer
        CFBundleDisplayName: FocusTimer
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: "14.0"
        LSApplicationCategoryType: public.app-category.productivity
        NSFocusStatusUsageDescription: "FocusTimer 在倒计时运行期间启用专注模式,在重置或完成时自动关闭。"
        NSUserNotificationsUsageDescription: "FocusTimer 在专注时段结束时发送系统通知提醒您。"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
    entitlements:
      path: FocusTimer/Resources/FocusTimer.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.FocusTimer
        PRODUCT_NAME: FocusTimer
        GENERATE_INFOPLIST_FILE: NO
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
